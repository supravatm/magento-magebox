name: build-php-8-1

on: workflow_dispatch

permissions:
  contents: read

jobs:
  php-8-1:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v7
        with:
          ref: release/next
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Build and push base
        id: docker_build_base
        uses: docker/build-push-action@v7
        with:
          context: images/php/8.1
          target: base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            markoshust/magento-php:8.1-fpm
            markoshust/magento-php:8.1-fpm-9
      -
        name: Build and push xdebug
        id: docker_build_xdebug
        uses: docker/build-push-action@v7
        with:
          context: images/php/8.1
          target: xdebug
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            markoshust/magento-php:8.1-fpm-xdebug
            markoshust/magento-php:8.1-fpm-xdebug-9
